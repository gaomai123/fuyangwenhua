<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐节案例管理</title>
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>音乐节案例管理</h1>
        <p>上传封面、视频，并维护前台“案例展示”内容</p>
      </div>
      <div class="topbar-actions">
        <a class="text-link" href="./index.html">返回后台首页</a>
        <button id="refreshCasesBtn" type="button">刷新案例</button>
      </div>
    </header>

    <main class="admin-layout">
      <section class="case-manager-layout">
        <form id="festivalCaseForm" class="case-form">
          <input type="hidden" name="id">

          <label>音乐节名称<input name="title" required placeholder="例如：海岛夏日音乐节"></label>
          <label>地址<input name="location" required placeholder="例如：平潭 / 海坛古城外场"></label>
          <label>角标<input name="tag" maxlength="2" placeholder="热 / 新 / 荐"></label>
          <label>排序<input name="sort_order" type="number" value="0"></label>

          <label>展示状态
            <select name="status">
              <option value="published">展示中</option>
              <option value="draft">草稿</option>
              <option value="hidden">隐藏</option>
            </select>
          </label>

          <label>上传封面<input name="cover_file" type="file" accept="image/*"></label>
          <label class="wide">封面地址<input name="cover_url" placeholder="/uploads/case-covers/xxx.jpg"></label>

          <label>上传视频<input name="video_file" type="file" accept="video/*"></label>
          <label class="wide">视频地址<input name="video_url" placeholder="/uploads/videos/xxx.mp4 或外部链接"></label>

          <label class="wide">封面简介<textarea name="summary" rows="3" placeholder="进入详情页前的简短说明"></textarea></label>
          <label class="wide">详细介绍<textarea name="detail" rows="5" placeholder="案例详情页展示的完整介绍"></textarea></label>

          <div class="form-actions wide">
            <button type="submit">保存案例</button>
            <button id="caseFormReset" type="button" class="ghost">清空表单</button>
          </div>
          <p id="caseMessage" class="message wide"></p>
        </form>

        <div>
          <div class="section-title">
            <h2>案例列表</h2>
          </div>
          <div id="festivalCaseList" class="case-admin-list"></div>
        </div>
      </section>
    </main>

    <script src="./js/api.js"></script>
    <script src="./js/cases.js"></script>
  </body>
</html>
